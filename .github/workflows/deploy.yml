# Deploys the built site by pushing dist/ to the gh-pages branch (Pages "deploy from branch" mode).
# NOTE (2026-07-03): this replaced the actions/deploy-pages artifact flow, whose backend sync got
# wedged for this site after GitHub's infra migration ("Deployment failed, try again later" at
# syncing_files, even for previously-deployed content — verified with canary deploys).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
