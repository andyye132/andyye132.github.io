<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>on the pursuit for one good idea — Andy Ye</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fbfaf6; color: #1d1d1b; font-family: Georgia, 'Times New Roman', serif; font-size: 16.5px; line-height: 1.75; }
  ::selection { background: #1c3aa9; color: #fff; }
  a { color: #1c3aa9; }

  .masthead { text-align: center; padding: 2.6rem 1rem 1.3rem; }
  .masthead h1 { font-size: 2.5rem; font-weight: 700; color: #a09b92; letter-spacing: .02em; }
  .masthead h1 a { color: inherit; text-decoration: none; }

  nav.bar { border-top: 3px solid #ccc8c0; border-bottom: 3px solid #ccc8c0; background: #fffefb; }
  nav.bar ul { list-style: none; display: flex; justify-content: space-around; flex-wrap: wrap; max-width: 780px; margin: 0 auto; }
  nav.bar a { display: block; padding: .5rem 1.6rem; color: #1c3aa9; font-size: 1.05rem; text-decoration: none; }
  nav.bar a:hover { text-decoration: underline; }
  nav.bar .here { font-weight: 700; }

  main { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.4rem 4rem; }
  .tagline { text-align: center; font-style: italic; color: #33302a; font-size: 1.7rem; font-weight: 700; margin-bottom: .4rem; }
  .today { text-align: center; font-family: 'Courier New', Courier, monospace; color: #b5afa4; font-size: .8rem;
    margin-bottom: 2.2rem; }

  .post { display: flex; gap: 1.2rem; align-items: flex-start; padding: 1.05rem 0; border-bottom: 1px solid #eeeae2; }
  .post .thumb { width: 180px; height: 126px; object-fit: cover; background: #fff; border: 1px solid #ccc8c0; padding: 4px; flex-shrink: 0; }
  .post .ptxt { flex: 1; }
  .post .date { font-family: 'Courier New', Courier, monospace; color: #a19b90; font-size: .84rem; }
  .post h2 { font-size: 1.2rem; font-weight: 700; line-height: 1.4; margin: .1rem 0 .25rem; }
  .post h2 a { color: #1c3aa9; text-decoration: none; }
  .post h2 a:hover { text-decoration: underline; }
  .post p { color: #6b665d; font-size: .95rem; }
  @media (max-width: 560px) { .post { flex-direction: column; } .post .thumb { width: 100%; height: auto; max-height: 220px; } }

  footer { text-align: center; padding: 0 1rem 3rem; font-family: 'Courier New', Courier, monospace;
    color: #b5afa4; font-size: .8rem; }

  @media (max-width: 640px) {
    .masthead h1 { font-size: 1.9rem; }
    nav.bar a { padding: .45rem .9rem; font-size: .95rem; }
  }
</style>
</head>
<body>

<header class="masthead"><h1><a href="/">Andy Ye</a></h1></header>
<nav class="bar">
  <ul>
    <li><a href="/">home</a></li>
    <li><a class="here" href="/blog-archive">blog</a></li>
    <li><a href="/cs">projects/research</a></li>
    <li><a href="/creative">creative</a></li>
    <li><a href="/cv">cv</a></li>
  </ul>
</nav>

<main>
  <p class="tagline">on the pursuit for one good idea</p>
  <p class="today" id="today-date"></p>
  <div id="posts"></div>
</main>

<footer>© 2026 andy ye · seattle, wa</footer>

<script>
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toLowerCase();

fetch('/api/posts.json').then(r=>r.json()).then(posts=>{
  const box = document.getElementById('posts');
  box.innerHTML = posts.map(p=>{
    const d = new Date(p.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const img = p.image ? `<a href="/blog/${p.slug}"><img class="thumb" src="${p.image}" alt="${p.title}" loading="lazy"></a>` : '';
    return `<div class="post">${img}<div class="ptxt">
      <span class="date">${d}</span>
      <h2><a href="/blog/${p.slug}">${p.title}</a></h2>
      <p>${p.description}</p>
    </div></div>`;
  }).join('');
}).catch(()=>{ document.getElementById('posts').innerHTML = '<p style="color:#8d887e;font-style:italic;">the essays are momentarily missing — try refreshing.</p>'; });
</script>
</body>
</html>
